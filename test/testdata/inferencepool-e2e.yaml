apiVersion: inference.networking.k8s.io/v1
kind: InferencePool
metadata:
  labels:
  name: vllm-qwen3-32b
spec:
  targetPorts:
    - number: 8000
  selector:
    matchLabels:
      app: vllm-qwen3-32b
  endpointPickerRef:
    name: vllm-qwen3-32b-epp
    namespace: $E2E_NS
    kind: Service
    port:
      number: 9002
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-qwen3-32b-epp
  namespace: $E2E_NS
spec:
  selector:
    app: vllm-qwen3-32b-epp
  ports:
    - protocol: TCP
      port: 9002
      targetPort: 9002
      appProtocol: http2
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vllm-qwen3-32b-epp
  namespace: $E2E_NS
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: pod-read
  namespace: $E2E_NS
rules:
- apiGroups: [ "inference.networking.x-k8s.io" ]
  resources: [ "inferenceobjectives", "inferencemodelrewrites" ]
  verbs: [ "get", "watch", "list" ]
- apiGroups: [ "llm-d.ai" ]
  resources: [ "inferenceobjectives", "inferencemodelrewrites" ]
  verbs: [ "get", "watch", "list" ]
- apiGroups: [ "inference.networking.k8s.io" ]
  resources: [ "inferencepools" ]
  verbs: [ "get", "watch", "list" ]
- apiGroups: [ "" ]
  resources: [ "pods" ]
  verbs: [ "get", "watch", "list" ]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: pod-read-binding
  namespace: $E2E_NS
subjects:
- kind: ServiceAccount
  name: vllm-qwen3-32b-epp
  namespace: $E2E_NS
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pod-read
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: auth-reviewer
rules:
- apiGroups:
  - authentication.k8s.io
  resources:
  - tokenreviews
  verbs:
  - create
- apiGroups:
  - authorization.k8s.io
  resources:
  - subjectaccessreviews
  verbs:
  - create
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: auth-reviewer-binding
subjects:
- kind: ServiceAccount
  name: vllm-qwen3-32b-epp
  namespace: $E2E_NS
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: auth-reviewer
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: plugins-config
  namespace: $E2E_NS
data:
  default-plugins.yaml: |
    apiVersion: inference.networking.x-k8s.io/v1alpha1
    kind: EndpointPickerConfig
    plugins:
    - type: queue-scorer
    - type: kv-cache-utilization-scorer
    - type: prefix-cache-scorer
    schedulingProfiles:
    - name: default
      plugins:
      - pluginRef: queue-scorer
      - pluginRef: kv-cache-utilization-scorer
      - pluginRef: prefix-cache-scorer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen3-32b-epp
  namespace: $E2E_NS
  labels:
    app: vllm-qwen3-32b-epp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-qwen3-32b-epp
  template:
    metadata:
      labels:
        app: vllm-qwen3-32b-epp
    spec:
      serviceAccountName: vllm-qwen3-32b-epp
      # Conservatively, this timeout should mirror the longest grace period of the pods within the pool
      terminationGracePeriodSeconds: 130
      containers:
      - name: epp
        image: $E2E_IMAGE
        imagePullPolicy: IfNotPresent
        args:
        - --pool-name
        - "vllm-qwen3-32b"
        - --pool-namespace
        - "$E2E_NS"
        - --v
        - "4"
        - --zap-encoder
        - "json"
        - --grpc-port
        - "9002"
        - --grpc-health-port
        - "9003"
        - "--config-file"
        - "/config/default-plugins.yaml"
        ports:
        - containerPort: 9002
        - containerPort: 9003
        - name: metrics
          containerPort: 9090
        livenessProbe:
          grpc:
            port: 9003
            service: inference-extension
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          grpc:
            port: 9003
            service: inference-extension
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: plugins-config-volume
          mountPath: "/config"
      volumes:
      - name: plugins-config-volume
        configMap:
          name: plugins-config
