{{- define "inference-extension.deployment" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llm-d-router.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-d-router.labels" . | nindent 4 }}
    {{- include "llm-d-router.modeLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.inferenceExtension.replicas | default 1 }}
  strategy:
    # The current recommended EPP deployment pattern is to have a single active replica. This ensures
    # optimal performance of the stateful operations such prefix cache aware scorer.
    # The Recreate strategy the old replica is killed immediately, and allow the new replica(s) to
    # quickly take over. This is particularly important in the high availability set up with leader
    # election, as the rolling update strategy would prevent the old leader being killed because
    # otherwise the maxUnavailable would be 100%.
    type: Recreate
  selector:
    matchLabels:
      {{- include "llm-d-router.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "llm-d-router.selectorLabels" . | nindent 8 }}
        {{- include "llm-d-router.modeLabels" . | nindent 8 }}
    spec:
      {{- $sidecar := include "llm-d-router.sidecar" . | fromYaml | default dict }}
      {{- $proxyType := include "llm-d-router.sidecarProxyType" . | trim }}
      {{- $sidecarConfigMap := index $sidecar "configMap" | default dict }}
      {{- $sidecarConfigMapName := index $sidecarConfigMap "name" | default "" }}
      {{- $inferenceExtensionFlags := deepCopy (.Values.inferenceExtension.flags | default dict) }}
      {{- if and (eq $proxyType "agentgateway") (not (hasKey $inferenceExtensionFlags "secure-serving")) }}
        {{- $_ := set $inferenceExtensionFlags "secure-serving" false }}
      {{- end }}
      serviceAccountName: {{ include "llm-d-router.name" . }}
      # Conservatively, this timeout should mirror the longest grace period of the pods within the pool
      terminationGracePeriodSeconds: 130
      containers:
      {{- if $sidecar.enabled }}
        - name: {{ $sidecar.name }}
          image: {{ $sidecar.image }}
          imagePullPolicy: {{ $sidecar.imagePullPolicy | default "IfNotPresent" }}
        {{- with $sidecar.command }}
          command:
            - {{ . | quote }}
        {{- end }}
        {{- with $sidecar.args }}
          args:
          {{- range . }}
            - {{ . | quote }}
          {{- end }}
        {{- end }}
        {{- with $sidecar.env }}
          env:
          {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- with $sidecar.ports }}
          ports:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with $sidecar.livenessProbe }}
          livenessProbe:
          {{- toYaml . | nindent 12 }}
        {{- end }}
        {{- with $sidecar.readinessProbe }}
          readinessProbe:
          {{- toYaml . | nindent 12 }}
        {{- end }}
        {{- with $sidecar.startupProbe }}
          startupProbe:
          {{- toYaml . | nindent 12 }}
        {{- end }}
        {{- with $sidecar.securityContext }}
          securityContext:
          {{- toYaml . | nindent 12 }}
        {{- end }}
        {{- with $sidecar.resources }}
          resources:
          {{- toYaml . | nindent 12 }}
        {{- end }}
        {{- if or (and (eq $proxyType "agentgateway") $sidecarConfigMapName) $sidecar.volumeMounts }}
          volumeMounts:
          {{- if and (eq $proxyType "agentgateway") $sidecarConfigMapName }}
            - name: agentgateway-config-template
              mountPath: /config
              readOnly: true
          {{- end }}
          {{- with $sidecar.volumeMounts }}
          {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
        {{- end }}
        - name: epp
          image: {{ .Values.inferenceExtension.image.registry }}/{{ .Values.inferenceExtension.image.repository }}:{{ .Values.inferenceExtension.image.tag }}
          imagePullPolicy: {{ .Values.inferenceExtension.image.pullPolicy | default "IfNotPresent" }}
          args:
          {{- /* 1. Determine Model Server Type Logic */ -}}
          {{- $modelServerType := "vllm" }}
          {{- if and .Values.inferenceExtension.endpointsServer (not .Values.inferenceExtension.endpointsServer.createInferencePool) -}}
            {{- $modelServerType = .Values.inferenceExtension.endpointsServer.modelServerType | default "vllm" }}
          {{- else }}
            {{- $modelServerType = .Values.inferencePool.modelServerType | default "vllm" }}
          {{- end }}
          {{- /* 2. Mode Specific Flags */ -}}
          {{- if and .Values.inferenceExtension.endpointsServer (not .Values.inferenceExtension.endpointsServer.createInferencePool) }}
              - --endpoint-selector
              - {{ .Values.inferenceExtension.endpointsServer.endpointSelector | quote }}
              - --endpoint-target-ports
              - {{ include "llm-d-router.standaloneEndpointTargetPorts" . | quote }}
          {{- else }}
              - --pool-name
              - {{ .Release.Name }}
              # The pool namespace is optional because EPP can default to the NAMESPACE env var.
              - --pool-namespace
              - {{ .Release.Namespace }}
              - --pool-group
              - "inference.networking.k8s.io"
          {{- end }}
          {{- if not .Values.inferenceExtension.latencyPredictor.enabled }}
          # Legacy metric CLI flags (skipped when dataLayer is enabled via latency predictor).
          {{- if eq $modelServerType "sglang" }}
              - --total-queued-requests-metric="sglang:num_queue_reqs"
              - --total-running-requests-metric="sglang:num_running_reqs"
              - --kv-cache-usage-percentage-metric="sglang:token_usage"
              - --cache-info-metric="sglang:cache_config_info"
          {{- end }}
          {{- if eq $modelServerType "triton-tensorrt-llm" }}
              - --total-queued-requests-metric
              - "nv_trt_llm_request_metrics{request_type=waiting}"
              - --total-running-requests-metric
              - "nv_trt_llm_request_metrics{request_type=scheduled}"
              - --kv-cache-usage-percentage-metric
              - "nv_trt_llm_kv_cache_block_metrics{kv_cache_block_type=fraction}"
              - --lora-info-metric
              - "" # Set an empty metric to disable LoRA metric scraping as they are not supported by Triton yet.
          {{- end }}
          {{- if eq $modelServerType "trtllm-serve" }}
              - --total-queued-requests-metric="trtllm_num_requests_waiting"
              - --total-running-requests-metric="trtllm_num_requests_running"
              - --kv-cache-usage-percentage-metric="trtllm_kv_cache_utilization"
              - --cache-info-metric="trtllm_cache_config_info"
              - --model-server-metrics-path="/prometheus/metrics"
              - --lora-info-metric
              - "" # LoRA metrics are not supported by trtllm-serve.
          {{- end }}
          {{- if eq $modelServerType "triton" }}
              - --total-queued-requests-metric="nv_inference_pending_request_count"
              - --total-running-requests-metric="nv_inference_exec_count"
              - --kv-cache-usage-percentage-metric=""
              - --cache-info-metric=""
              - --lora-info-metric=""
          {{- end }}
          {{- end }}
              - --zap-encoder
              - "json"
              - --config-file
              - "/config/{{ .Values.inferenceExtension.pluginsConfigFile }}"
          {{- if gt (.Values.inferenceExtension.replicas | int) 1 }}
              - --ha-enable-leader-election
          {{- end }}
              # Pass additional flags via the inferenceExtension.flags field in values.yaml.
              # Render them as --flag=value so boolean values are parsed correctly.
          {{- range $key, $value := $inferenceExtensionFlags }}
              - {{ printf "--%s=%v" $key $value | quote }}
          {{- end }}
          {{- if .Values.inferenceExtension.tracing.enabled }}
              - --tracing=true
          {{- else }}
              - --tracing=false
          {{- end }}
          {{- if not .Values.inferenceExtension.monitoring.prometheus.auth.enabled }}
              - --metrics-endpoint-auth=false
          {{- end }}
          {{- with .Values.inferenceExtension.resources }}
          resources:
            {{ toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: grpc
              containerPort: 9002
            - name: grpc-health
              containerPort: 9003
            - name: metrics
              containerPort: 9090
        {{- if .Values.inferenceExtension.extraContainerPorts }}
            {{- toYaml .Values.inferenceExtension.extraContainerPorts | nindent 12 }}
        {{- end }}
          livenessProbe:
          {{- if gt (.Values.inferenceExtension.replicas | int) 1 }}
            grpc:
              port: 9003
              service: liveness
          {{- else }}
            grpc:
              port: 9003
              service: inference-extension
          {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
          {{- if gt (.Values.inferenceExtension.replicas | int) 1 }}
            grpc:
              port: 9003
              service: readiness
          {{- else }}
            grpc:
              port: 9003
              service: inference-extension
          {{- end }}
            periodSeconds: 2
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
        {{- include "llm-d-router.latencyPredictor.env" . | nindent 12 }}
        {{- if .Values.inferenceExtension.tracing.enabled }}
            - name: OTEL_SERVICE_NAME
              value: "llm-d-router/epp"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.inferenceExtension.tracing.otelExporterEndpoint | quote }}
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_RESOURCE_ATTRIBUTES_NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: OTEL_RESOURCE_ATTRIBUTES_POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: 'k8s.namespace.name=$(NAMESPACE),k8s.node.name=$(OTEL_RESOURCE_ATTRIBUTES_NODE_NAME),k8s.pod.name=$(OTEL_RESOURCE_ATTRIBUTES_POD_NAME)'
            - name: OTEL_TRACES_SAMPLER
              value: {{ .Values.inferenceExtension.tracing.sampling.sampler | quote }}
            - name: OTEL_TRACES_SAMPLER_ARG
              value: {{ .Values.inferenceExtension.tracing.sampling.samplerArg | quote }}
        {{- end }}
        {{- if .Values.inferenceExtension.env }}
        {{- toYaml .Values.inferenceExtension.env | nindent 12 }}
        {{- end }}
          volumeMounts:
            - name: plugins-config-volume
              mountPath: "/config"
        {{- if .Values.inferenceExtension.volumeMounts }}
        {{- toYaml .Values.inferenceExtension.volumeMounts | nindent 12 }}
        {{- end }}
      {{- include "llm-d-router.latencyPredictor.containers" . | nindent 8 }}
      volumes:
      {{- if .Values.inferenceExtension.volumes }}
      {{- toYaml .Values.inferenceExtension.volumes | nindent 8 }}
      {{- end }}
      {{- if and $sidecar.enabled (eq $proxyType "agentgateway") $sidecarConfigMapName }}
        - name: agentgateway-config-template
          configMap:
            name: {{ $sidecarConfigMapName }}
            items:
              - key: config.yaml
                path: config.yaml
      {{- end }}
      {{- with $sidecar.volumes }}
      {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
        - name: plugins-config-volume
          configMap:
            name: {{ include "llm-d-router.name" . }}
      {{- include "llm-d-router.latencyPredictor.volumes" . | nindent 8 }}
      {{- if .Values.inferenceExtension.affinity }}
      affinity:
        {{- toYaml .Values.inferenceExtension.affinity | nindent 8 }}
      {{- end }}
      {{- if .Values.inferenceExtension.tolerations }}
      tolerations:
        {{- toYaml .Values.inferenceExtension.tolerations | nindent 8 }}
      {{- end }}
---
{{- end }}
